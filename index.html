<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vigor Health Juice — Africa's Antidote. A Prescription for Life.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700;1,9..144,900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ════════════════════════════════════════════════
   DESIGN TOKENS — from spec §1.1
════════════════════════════════════════════════ */
:root{
  --g:   #2E7D32;  --g-dk:#1B5E20;  --g-lt:#E8F5E9;  --g-mid:#43A047;
  --o:   #F57000;  --o-dk:#C45D00;  --o-lt:#FFF3E0;
  --p:   #6A1B9A;  --p-dk:#4A148C;  --p-lt:#F3E5F5;
  --gold:#C5A059;  --gold-lt:#FFF8E7; --gold-dk:#9A7A3A;
  --ink: #111827;  --ink2:#1F2937;  --mid:#4B5563;  --muted:#9CA3AF;
  --lab: #F9FAFB;  --white:#FFFFFF;  --rule:#E5E7EB;
  --nav-h:64px;    --r:8px;
}

/* ════════════════════════════════════════════════
   RESET
════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;font-size:16px;}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--ink);overflow-x:hidden;line-height:1.6;}
img{max-width:100%;display:block;}
a{text-decoration:none;color:inherit;}
button,select,input{font-family:inherit;}

/* ════════════════════════════════════════════════
   GLOBAL TYPOGRAPHY
════════════════════════════════════════════════ */
.f-display{font-family:'Fraunces',serif;font-weight:900;}
.f-serif{font-family:'Fraunces',serif;}
.f-mono{font-family:'DM Mono',monospace;}
.eyebrow{
  font-family:'DM Mono',monospace;font-size:.68rem;
  letter-spacing:.22em;text-transform:uppercase;
  color:var(--muted);display:block;margin-bottom:10px;
}
.eyebrow.green{color:var(--g);}
.eyebrow.orange{color:var(--o);}
.eyebrow.gold{color:var(--gold);}
.eyebrow.white{color:rgba(255,255,255,.55);}

/* ════════════════════════════════════════════════
   LAYOUT
════════════════════════════════════════════════ */
.container{max-width:1200px;margin:0 auto;padding:0 24px;}
.section{padding:96px 0;}
.section-dark{background:var(--ink);}
.section-lab{background:var(--lab);}
.section-green{background:var(--g);}

/* ════════════════════════════════════════════════
   BUTTONS
════════════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 26px;border-radius:4px;
  font-weight:600;font-size:.85rem;letter-spacing:.04em;
  text-transform:uppercase;transition:all .2s ease;cursor:pointer;border:none;
}
.btn-green{background:var(--g);color:#fff;}
.btn-green:hover{background:var(--g-dk);transform:translateY(-2px);box-shadow:0 8px 20px rgba(46,125,50,.3);}
.btn-orange{background:var(--o);color:#fff;}
.btn-orange:hover{background:var(--o-dk);transform:translateY(-2px);box-shadow:0 8px 20px rgba(245,112,0,.3);}
.btn-outline-dark{background:transparent;color:var(--ink);border:1.5px solid var(--ink);}
.btn-outline-dark:hover{background:var(--ink);color:#fff;}
.btn-outline-white{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.4);}
.btn-outline-white:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.8);}
.btn-outline-green{background:transparent;color:var(--g);border:1.5px solid var(--g);}
.btn-outline-green:hover{background:var(--g);color:#fff;}

/* ════════════════════════════════════════════════
   SCROLL REVEAL
════════════════════════════════════════════════ */
.rv{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease;}
.rv.in{opacity:1;transform:none;}
.rv-l{opacity:0;transform:translateX(-28px);transition:opacity .6s ease,transform .6s ease;}
.rv-l.in{opacity:1;transform:none;}
.rv-r{opacity:0;transform:translateX(28px);transition:opacity .6s ease,transform .6s ease;}
.rv-r.in{opacity:1;transform:none;}

/* ════════════════════════════════════════════════
   NAV
════════════════════════════════════════════════ */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:900;
  height:var(--nav-h);background:rgba(255,255,255,.96);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--rule);
  transition:box-shadow .3s;
}
#nav.shadow{box-shadow:0 2px 16px rgba(0,0,0,.08);}
.nav-wrap{
  height:100%;display:flex;align-items:center;gap:24px;
  max-width:1200px;margin:0 auto;padding:0 24px;
}
.nav-logo{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.nav-hex{
  width:32px;height:32px;background:var(--g);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
}
.nav-hex svg{width:16px;height:16px;}
.nav-wordmark{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:1.2rem;color:var(--ink);letter-spacing:.02em;
}
.nav-links{display:flex;gap:2px;margin-left:auto;}
.nav-links a{
  font-size:.82rem;font-weight:500;color:var(--mid);
  padding:6px 12px;border-radius:4px;transition:color .2s;
}
.nav-links a:hover{color:var(--ink);}
.nav-actions{display:flex;align-items:center;gap:12px;}
.cart-wrap{
  position:relative;width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink);cursor:pointer;
}
.cart-badge{
  position:absolute;top:4px;right:4px;
  width:16px;height:16px;border-radius:50%;
  background:var(--o);color:#fff;font-weight:700;
  font-size:9px;display:flex;align-items:center;justify-content:center;
  transition:transform .2s;
}
.cart-badge.bump{transform:scale(1.5);}

/* ════════════════════════════════════════════════
   HERO — split screen, white/clinical
════════════════════════════════════════════════ */
#hero{
  min-height:100vh;padding-top:var(--nav-h);
  display:grid;grid-template-columns:1fr 1fr;
}
.hero-left{
  display:flex;flex-direction:column;justify-content:center;
  padding:80px 60px 80px 24px;
  max-width:680px;margin-left:auto;
}
.hero-kicker{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--g-lt);border:1px solid rgba(46,125,50,.2);
  padding:5px 14px;border-radius:100px;margin-bottom:24px;
  font-family:'DM Mono',monospace;font-size:.66rem;
  letter-spacing:.18em;text-transform:uppercase;color:var(--g);
}
.hero-kicker-dot{
  width:7px;height:7px;border-radius:50%;background:var(--g-mid);
  animation:pulse 2s ease infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.5);opacity:.5;}}
.hero-h1{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:clamp(2.6rem,4.5vw,3.8rem);
  line-height:1.0;color:var(--ink);margin-bottom:20px;
}
.hero-h1 em{
  font-style:italic;
  background:linear-gradient(135deg,var(--g) 0%,var(--g-mid) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-h1 .highlight{
  font-style:italic;
  background:linear-gradient(135deg,var(--o) 0%,#FFB300 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{
  font-size:1rem;color:var(--mid);line-height:1.75;
  max-width:460px;margin-bottom:32px;
}
.hero-sub strong{color:var(--ink);}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:40px;}
.hero-stats{
  display:flex;gap:0;border:1px solid var(--rule);border-radius:var(--r);
  overflow:hidden;
}
.hs-item{
  flex:1;padding:16px 20px;border-right:1px solid var(--rule);
  text-align:center;
}
.hs-item:last-child{border-right:none;}
.hs-val{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:1.5rem;line-height:1;color:var(--g);
  display:block;margin-bottom:3px;
}
.hs-label{font-size:.72rem;color:var(--muted);line-height:1.3;}

/* Hero right — product visual */
.hero-right{
  background:var(--lab);
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.hero-right-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 65% 55% at 60% 50%,rgba(46,125,50,.07) 0%,transparent 70%),
    radial-gradient(ellipse 40% 35% at 85% 20%,rgba(197,160,89,.06) 0%,transparent 60%);
}
.hero-cans{
  position:relative;z-index:2;
  display:flex;align-items:flex-end;justify-content:center;
  gap:16px;padding:60px 40px;
  width:100%;
}
.hcan{
  display:flex;flex-direction:column;align-items:center;
  animation:floatup 4s ease-in-out infinite;
}
.hcan:nth-child(2){animation-delay:-1.2s;transform:scale(1.15);}
.hcan:nth-child(3){animation-delay:-2.4s;}
.hcan:nth-child(4){animation-delay:-3.2s;transform:scale(.88);}
@keyframes floatup{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.hcan:nth-child(2){animation:floatup2 4s ease-in-out infinite;}
@keyframes floatup2{0%,100%{transform:translateY(0) scale(1.15);}50%{transform:translateY(-12px) scale(1.15);}}
.hcan:nth-child(4){animation:floatup4 4s ease-in-out infinite;}
@keyframes floatup4{0%,100%{transform:translateY(0) scale(.88);}50%{transform:translateY(-12px) scale(.88);}}

/* ════════════════════════════════════════════════
   TRUST BAR
════════════════════════════════════════════════ */
.trust-bar{
  background:var(--ink);overflow:hidden;
  padding:14px 0;border-top:3px solid var(--gold);
}
.trust-track{
  display:flex;width:max-content;
  animation:scroll 30s linear infinite;
}
.trust-item{
  display:flex;align-items:center;gap:10px;
  padding:0 36px;white-space:nowrap;
  font-family:'DM Mono',monospace;font-size:.68rem;
  letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.75);
}
.trust-icon{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(197,160,89,.2);font-size:.8rem;flex-shrink:0;
}
.trust-sep{color:var(--gold);margin:0 4px;font-size:.7rem;}
@keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ════════════════════════════════════════════════
   MARKET DISRUPTION
════════════════════════════════════════════════ */
#disruption{padding:96px 0;}
.disruption-grid{
  display:grid;grid-template-columns:1fr 1fr;
  align-items:center;gap:80px;
}
.disrupt-h2{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:clamp(2rem,3.5vw,2.8rem);
  line-height:1.08;color:var(--ink);margin-bottom:16px;
}
.disrupt-h2 em{font-style:italic;color:var(--o);}
.disrupt-body{
  font-size:.92rem;line-height:1.8;color:var(--mid);
  margin-bottom:28px;
}
.moat-grid{display:flex;flex-direction:column;gap:10px;}
.moat-row{
  display:grid;grid-template-columns:26px 1fr;
  align-items:start;gap:12px;
  padding:14px 16px;
  background:var(--lab);border:1px solid var(--rule);
  border-radius:6px;
}
.moat-check{
  width:26px;height:26px;border-radius:50%;
  background:var(--g);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.moat-check svg{width:12px;height:12px;}
.moat-label{font-weight:600;font-size:.84rem;color:var(--ink);}
.moat-sub{font-size:.74rem;color:var(--muted);margin-top:2px;display:block;}

.chart-panel{
  background:var(--lab);border:1px solid var(--rule);
  border-radius:var(--r);padding:28px;
}
.chart-panel-head{margin-bottom:20px;}
.chart-panel-title{
  font-family:'Fraunces',serif;font-weight:700;
  font-size:1.05rem;color:var(--ink);margin-bottom:4px;
}
.chart-panel-sub{font-size:.75rem;color:var(--muted);}
.chart-legend{display:flex;gap:20px;margin-top:10px;}
.cl{display:flex;align-items:center;gap:6px;font-size:.73rem;color:var(--mid);}
.cl-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.stat-duo{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.stat-box{
  background:var(--white);border:1px solid var(--rule);
  border-radius:6px;padding:16px;
}
.sb-val{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:1.7rem;display:block;line-height:1;margin-bottom:4px;
}
.sb-label{font-size:.72rem;color:var(--muted);line-height:1.4;}

/* ════════════════════════════════════════════════
   PRODUCT PRESCRIPTION MATRIX
════════════════════════════════════════════════ */
#products{padding:96px 0;background:var(--lab);}
.section-header{text-align:center;margin-bottom:48px;}
.section-h2{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:clamp(2rem,3.5vw,2.8rem);
  line-height:1.1;color:var(--ink);margin-bottom:12px;
}
.section-p{font-size:.92rem;color:var(--mid);max-width:520px;margin:0 auto;line-height:1.7;}

/* Tab system */
.tab-nav{
  display:flex;gap:0;
  border:1px solid var(--rule);border-radius:6px;
  overflow:hidden;width:fit-content;margin:0 auto 40px;
}
.tab-btn{
  padding:11px 24px;font-size:.8rem;font-weight:600;
  color:var(--muted);background:var(--white);
  border-right:1px solid var(--rule);
  transition:all .2s;cursor:pointer;white-space:nowrap;
  letter-spacing:.02em;
}
.tab-btn:last-child{border-right:none;}
.tab-btn.on{color:var(--white);background:var(--ink);}
.tab-btn.on[data-line="VHJ"]{background:var(--g);}
.tab-btn.on[data-line="VWL"]{background:var(--o);}
.tab-btn.on[data-line="VFJ"]{background:#558B2F;}
.tab-btn.on[data-line="VP"]{background:var(--p);}
.tab-panel{display:none;animation:fIn .3s ease;}
.tab-panel.on{display:block;}
@keyframes fIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* Product grid */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(256px,1fr));gap:20px;}
.pcard{
  background:var(--white);border:1px solid var(--rule);
  border-radius:var(--r);overflow:hidden;
  transition:box-shadow .3s,transform .3s;
}
.pcard:hover{box-shadow:0 16px 40px rgba(0,0,0,.1);transform:translateY(-5px);}
.pc-img{
  height:210px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.pc-series-tag{
  position:absolute;top:12px;left:12px;
  font-family:'DM Mono',monospace;font-size:.6rem;
  letter-spacing:.15em;text-transform:uppercase;
  padding:4px 10px;border-radius:100px;font-weight:500;
}
.pc-body{padding:18px;}
.pc-name{
  font-family:'Fraunces',serif;font-weight:700;
  font-size:1rem;color:var(--ink);margin-bottom:6px;line-height:1.25;
}
.pc-claim{font-size:.77rem;color:var(--mid);line-height:1.6;margin-bottom:14px;}
.pc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.pc-tag{
  font-size:.62rem;font-family:'DM Mono',monospace;
  padding:3px 8px;border-radius:4px;letter-spacing:.04em;
}
.pc-actions{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:14px;border-top:1px solid var(--rule);
}
.pc-price{
  font-family:'Fraunces',serif;font-weight:700;font-size:1.15rem;color:var(--ink);
}
.pc-price small{font-family:'DM Sans',sans-serif;font-size:.72rem;color:var(--muted);font-weight:400;}
.pc-add{
  width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.pc-sub-row{
  display:flex;align-items:center;gap:8px;
  margin-top:10px;padding-top:10px;border-top:1px solid var(--rule);
}
.pc-sub-label{font-size:.72rem;color:var(--muted);}
.pc-sub-select{
  flex:1;font-size:.72rem;
  border:1px solid var(--rule);border-radius:4px;
  padding:4px 8px;color:var(--ink);background:var(--lab);
  cursor:pointer;outline:none;
}

/* Line colour roles */
.line-vjh .pc-img{background:linear-gradient(150deg,#F1F8E9,#DCEDC8);}
.line-vjh .pc-series-tag{background:var(--g-lt);color:var(--g-dk);}
.line-vjh .pc-tag{background:var(--g-lt);color:var(--g-dk);}
.line-vjh .pc-add{background:var(--g);color:#fff;}

.line-vwl .pc-img{background:linear-gradient(150deg,#FFF3E0,#FFE0B2);}
.line-vwl .pc-series-tag{background:var(--o-lt);color:#BF360C;}
.line-vwl .pc-tag{background:var(--o-lt);color:#BF360C;}
.line-vwl .pc-add{background:var(--o);color:#fff;}
.line-vwl .pc-price{color:var(--o-dk);}

.line-vfj .pc-img{background:linear-gradient(150deg,#F9FBE7,#F0F4C3);}
.line-vfj .pc-series-tag{background:#F1F8E9;color:#33691E;}
.line-vfj .pc-tag{background:#F1F8E9;color:#33691E;}
.line-vfj .pc-add{background:#558B2F;color:#fff;}

.line-vp .pc-img{background:linear-gradient(150deg,#F3E5F5,#E1BEE7);}
.line-vp .pc-series-tag{background:var(--p-lt);color:var(--p);}
.line-vp .pc-tag{background:var(--p-lt);color:var(--p);}
.line-vp .pc-add{background:var(--p);color:#fff;}
.line-vp .pc-price{color:var(--p);}

/* ════════════════════════════════════════════════
   CLINICAL ACCORDION (PDP elements)
════════════════════════════════════════════════ */
#clinical{padding:96px 0;}
.clinical-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;}
.clinical-left .big-quote{
  font-family:'Fraunces',serif;font-style:italic;font-weight:700;
  font-size:clamp(1.5rem,3vw,2.2rem);
  color:var(--ink);line-height:1.3;
  border-left:4px solid var(--g);padding-left:20px;
  margin:20px 0 28px;
}
.archetype-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px;}
.archetype-card{
  padding:16px;border:1px solid var(--rule);border-radius:6px;
  background:var(--lab);
}
.arc-icon{font-size:1.3rem;margin-bottom:8px;}
.arc-name{font-weight:700;font-size:.82rem;color:var(--ink);margin-bottom:4px;}
.arc-desc{font-size:.73rem;color:var(--muted);line-height:1.5;}

/* Accordion */
.accordion{border:1px solid var(--rule);border-radius:var(--r);overflow:hidden;}
.acc-item{border-bottom:1px solid var(--rule);}
.acc-item:last-child{border-bottom:none;}
.acc-trigger{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;background:var(--white);
  cursor:pointer;text-align:left;border:none;
  transition:background .2s;
}
.acc-trigger:hover{background:var(--lab);}
.acc-trigger.open{background:var(--lab);}
.acc-title{font-weight:600;font-size:.88rem;color:var(--ink);}
.acc-arrow{
  width:20px;height:20px;border-radius:50%;
  background:var(--lab);border:1px solid var(--rule);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform .25s,background .2s;
}
.acc-trigger.open .acc-arrow{transform:rotate(45deg);background:var(--g);}
.acc-trigger.open .acc-arrow svg{stroke:#fff;}
.acc-body{
  max-height:0;overflow:hidden;transition:max-height .35s ease;
}
.acc-body-inner{
  padding:16px 20px 20px;font-size:.83rem;color:var(--mid);line-height:1.75;
  border-top:1px solid var(--rule);
}
.acc-body-inner strong{color:var(--ink);}
.clinical-bullets{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.clinical-bullets li{
  display:flex;align-items:flex-start;gap:10px;
  font-size:.82rem;color:var(--mid);
}
.clinical-bullets li::before{
  content:'✦';color:var(--g);flex-shrink:0;margin-top:2px;font-size:.7rem;
}
.source-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.source-card{
  background:var(--lab);border:1px solid var(--rule);
  border-radius:6px;padding:12px;
}
